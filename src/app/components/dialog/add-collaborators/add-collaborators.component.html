<div class="father lg:w-[40rem] sm:w-[20rem] p-6">
    <div class="flex justify-between items-center w-full mb-4">
        <div class="text-lg font-medium">Share this post</div>
        <button [mat-dialog-close] class="text-gray-700 hover:text-black"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>

    <form (keyup)="autoSearchFreind($event)" #myForm="ngForm" class="search relative w-full">
        <div>
            <input autocomplete="off" name="people" [(ngModel)]="freindToSearch" required #people="ngModel" type="text"
                placeholder="Search in your followings..."
                class="w-full border border-gray-300 rounded-full py-3 px-4 focus:outline-none focus:ring-2 focus:ring-green-200" />
        </div>
    </form>

    <div *ngIf="followings.length" class="followers overflow-y-auto max-h-60 mt-4 divide-y divide-gray-100">
        <div class="follower flex items-center gap-3 py-3" *ngFor="let following of followings">
            <input [checked]="collaborators.includes(following._id)" (click)="addCollaborator(following._id)" type="checkbox"
                class="w-4 h-4" />
            <img [src]="'../../../assets/images/'+following.image" class="w-10 h-10 rounded-full object-cover" alt="" />
            <div class="text-sm font-medium">{{following.name}}</div>
        </div>
    </div>

    <div class="mt-3 mb-4 text-green-600 text-sm hover:cursor-pointer" (click)="loadMoreFreinds()">See More</div>

    <div class="flex justify-end">
        <button (click)="sendNotification()" [mat-dialog-close]
            class="bg-[#03a811] px-5 py-2 text-white rounded-full hover:bg-[#03960f]">Share Article</button>
    </div>

</div>
